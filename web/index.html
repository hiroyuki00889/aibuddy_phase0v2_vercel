<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AIbo！</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="theme-free">
  <div id="gate" class="gate">
    <div class="gateCard">
      <h2>合言葉を入力してください</h2>
      <input id="passInput" type="password" placeholder="パスコード" />
      <button id="passBtn" class="btn">入室</button>
      <p id="passError" class="error hidden">合言葉が違います</p>
    </div>
  </div>

  <div class="app">
    <header class="header">
      <!-- //***変更箇所**** ここから：ヘッダー構成を画像表示に合わせる -->
  <div class="headerTop">
    <div class="headerTitleArea">
      <h1>AIbo！</h1>
      <p class="sub">あなたの相棒として何でも聞きたい</p>
    </div>

    <div class="mode">
      <button id="modeFreeBtn" class="btn chip active">フリートーク</button>
      <button id="modeWallBtn" class="btn chip">整理&GO！</button>
    </div>
  </div>

  <div class="headerBottom">
    <!-- //***変更箇所**** ここから：左側の時間UIをまとめる -->
    <div class="wallControls">
      <div id="wallDurationBox" class="wallDurationBox hidden">
        <label for="wallMinutesInput">設定時間</label>
        <input id="wallMinutesInput" type="range" min="1" max="30" value="5" />
        <span id="wallMinutesValue">5分</span>
      </div>

      <div id="wallTimerBox" class="wallTimerBox hidden">
        <span id="timerText">--:--</span>
        <div class="progress" aria-hidden="true">
          <div id="progressBar" class="bar"></div>
        </div>
      </div>
    </div>
    <!-- //***変更箇所**** ここまで -->

    <button id="endBtn" class="btn ghost sessionEndBtn">セッション終了</button>
  </div>
  <!-- //***変更箇所**** ここまで -->
    </header>

    <main id="chat" class="chat" aria-live="polite"></main>

    <footer class="composer">
      <!-- //***変更箇所**** ここから：inputをtextareaに変更 -->
      <textarea id="input" placeholder="今の気持ちを一言でも…" autocomplete="off" rows="2"></textarea>
      <!-- //***変更箇所**** ここまで -->      
      <button id="sendBtn" class="btn">送信</button>
      <button id="summarizeBtn" class="btn ghost hidden">まとめる</button>
    </footer>
  </div>

  <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modalCard">
      <h2>今日を閉じる</h2>
      <p id="closingText" class="closing"></p>
      <div class="modalActions">
        <button id="resetBtn" class="btn">新しい会話を始める</button>
        <button id="closeBtn" class="btn ghost">閉じる</button>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
